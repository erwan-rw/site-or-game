<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MegaBro — Super Platformer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        #game-wrap {
            position: relative;
            display: inline-block;
        }

        /* ─── Touch Controls ─── */
        #touch-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 100;
            display: none;
            /* shown via JS on mobile */
        }

        #dpad {
            position: absolute;
            bottom: 14px;
            left: 14px;
            display: flex;
            gap: 8px;
            pointer-events: all;
        }

        .tbtn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 2px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }

        #btn-jump {
            position: absolute;
            bottom: 14px;
            right: 14px;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(255, 200, 0, 0.35);
            border: 2px solid rgba(255, 200, 0, 0.7);
            color: #fff;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            pointer-events: all;
        }
    </style>
</head>

<body>
    <div id="game-wrap">
        <div id="game-container"></div>
        <!-- Mobile touch overlay -->
        <div id="touch-ui">
            <div id="dpad">
                <div class="tbtn" id="btn-left">◀</div>
                <div class="tbtn" id="btn-right">▶</div>
            </div>
            <div id="btn-jump">▲</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script>
        'use strict';
        // ═══════════════════════════════════════════════════════════════
        //  GLOBALS & CONSTANTS
        // ═══════════════════════════════════════════════════════════════
        const GW = 800, GH = 450, T = 32; // Game Width, Height, Tile size

        // Touch state (shared across scenes)
        const touch = { left: false, right: false, jump: false };

        // ═══════════════════════════════════════════════════════════════
        //  TOUCH CONTROLS (init once on DOM ready)
        // ═══════════════════════════════════════════════════════════════
        function initTouchControls() {
            const ui = document.getElementById('touch-ui');
            const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 700;
            if (mobile) ui.style.display = 'block';

            const bind = (id, prop) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', e => { e.preventDefault(); touch[prop] = true; }, { passive: false });
                el.addEventListener('touchend', e => { e.preventDefault(); touch[prop] = false; }, { passive: false });
                el.addEventListener('mousedown', () => touch[prop] = true);
                el.addEventListener('mouseup', () => touch[prop] = false);
                el.addEventListener('mouseleave', () => touch[prop] = false);
            };
            bind('btn-left', 'left');
            bind('btn-right', 'right');
            bind('btn-jump', 'jump');
        }

        // ═══════════════════════════════════════════════════════════════
        //  WEB AUDIO MANAGER
        // ═══════════════════════════════════════════════════════════════
        const SFX = {
            ctx: null,
            bgTimer: null,
            muted: false,

            init() {
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { }
            },
            resume() { if (this.ctx?.state === 'suspended') this.ctx.resume(); },

            _tone(freq, dur, type = 'square', vol = 0.2, delay = 0) {
                if (!this.ctx || this.muted || freq <= 0) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + delay + dur);
                    osc.start(this.ctx.currentTime + delay);
                    osc.stop(this.ctx.currentTime + delay + dur);
                } catch (e) { }
            },

            jump() { this._tone(300, 0.05); this._tone(520, 0.12, 'square', 0.15, 0.05); },
            coin() { this._tone(880, 0.07, 'triangle', 0.2); this._tone(1320, 0.12, 'triangle', 0.15, 0.07); },
            stomp() { this._tone(140, 0.18, 'square', 0.35); },
            death() { [300, 240, 190, 150, 100].forEach((f, i) => this._tone(f, 0.14, 'sawtooth', 0.25, i * 0.1)); },
            powerup() { [523, 659, 784, 1047].forEach((f, i) => this._tone(f, 0.15, 'triangle', 0.22, i * 0.1)); },
            brick() { this._tone(200, 0.1, 'square', 0.3); this._tone(140, 0.18, 'sawtooth', 0.2, 0.05); },
            lvlDone() { [523, 659, 784, 1047, 1319].forEach((f, i) => this._tone(f, 0.22, 'triangle', 0.25, i * 0.12)); },

            startBg(lvl = 0) {
                this.stopBg();
                const m = lvl === 0
                    ? [523, 0, 659, 0, 784, 659, 523, 440, 392, 0, 440, 523, 659, 0, 784, 0]
                    : [392, 0, 494, 0, 587, 0, 698, 587, 494, 392, 0, 587, 784, 0, 698, 0];
                let i = 0;
                this.bgTimer = setInterval(() => {
                    if (!this.muted) this._tone(m[i % m.length], 0.22, 'triangle', 0.07);
                    i++;
                }, 285);
            },
            stopBg() { clearInterval(this.bgTimer); this.bgTimer = null; },
        };

        // ═══════════════════════════════════════════════════════════════
        //  TEXTURE FACTORY (shared, called once per key)
        // ═══════════════════════════════════════════════════════════════
        function makeTex(scene, key, w, h, fn) {
            if (scene.textures.exists(key)) return;
            const cv = document.createElement('canvas');
            cv.width = w; cv.height = h;
            fn(cv.getContext('2d'));
            scene.textures.addCanvas(key, cv);
        }

        function buildAllTextures(scene) {
            // ── Player ─────────────────────────────────────────────────
            makeTex(scene, 'p_idle', 28, 52, c => {
                c.fillStyle = '#FFB300'; c.fillRect(0, 26, 28, 22); c.fillRect(2, 4, 24, 22);
                c.fillStyle = '#c62828'; c.fillRect(0, 0, 28, 7); c.fillRect(5, -6, 18, 8);
                c.fillStyle = '#000'; c.fillRect(16, 9, 6, 6);
                c.fillStyle = '#e65100'; c.fillRect(11, 18, 7, 4);
                c.fillStyle = '#1565c0'; c.fillRect(0, 26, 28, 12);
                c.fillStyle = '#FFB300'; c.fillRect(2, 38, 10, 10); c.fillRect(16, 38, 10, 10);
                c.fillStyle = '#4a2500'; c.fillRect(0, 46, 13, 6); c.fillRect(15, 46, 13, 6);

            makeTex(scene, 'p_run', 28, 52, c => {

                c.fillStyle = '#e65100'; c.fillRect(11, 18, 7, 4);

            });
            makeTex(scene, 'p_jump', 28, 52, c => {
                c.fillStyle = '#FFB300'; c.fillRect(0, 26, 28, 18); c.fillRect(2, 4, 24, 22);
                c.fillStyle = '#c62828'; c.fillRect(0, 0, 28, 7); c.fillRect(5, -6, 18, 8);
                c.fillStyle = '#000'; c.fillRect(16, 9, 6, 6);
                c.fillStyle = '#e65100'; c.fillRect(11, 18, 7, 4);
                c.fillStyle = '#1565c0'; c.fillRect(0, 26, 28, 12);
                c.fillStyle = '#FFB300'; c.fillRect(-4, 28, 6, 14); c.fillRect(26, 28, 6, 14);
                c.fillRect(2, 38, 10, 8); c.fillRect(10, 44, 6, 8); c.fillRect(16, 38, 10, 8); c.fillRect(16, 44, 8, 8);
                c.fillStyle = '#4a2500'; c.fillRect(8, 48, 14, 4); c.fillRect(14, 48, 14, 4);
            });
            makeTex(scene, 'p_star', 28, 52, c => {
                // Rainbow invincible flash — yellow/white mosaic
                c.fillStyle = '#FFD700'; c.fillRect(0, 0, 28, 52);
                c.fillStyle = '#fff176'; c.fillRect(4, 4, 20, 44);
                c.fillStyle = '#fff'; c.fillRect(8, 8, 12, 12); c.fillRect(4, 30, 6, 6); c.fillRect(18, 20, 6, 6);
            });

            // ── Enemies ────────────────────────────────────────────────
            // Goomba (patrol)
            const goomba = (c, legL) => {
                c.fillStyle = '#795548';
                c.beginPath(); c.arc(16, 18, 13, 0, Math.PI * 2); c.fill();
                c.fillRect(3, 18, 26, 14);
                c.fillStyle = '#ffccbc'; c.fillRect(6, 9, 20, 13);
                c.fillStyle = '#fff'; c.fillRect(7, 10, 8, 7); c.fillRect(17, 10, 8, 7);
                c.fillStyle = '#000'; c.fillRect(9, 12, 4, 4); c.fillRect(19, 12, 4, 4);
                c.fillStyle = '#3e2723'; c.fillRect(7, 8, 9, 3); c.fillRect(17, 8, 9, 3);
                c.fillStyle = '#4a2500';

                else { c.fillRect(3, 30, 12, 4); c.fillRect(17, 30, 12, 4); }
            };
            makeTex(scene, 'goomba', 32, 34, c => goomba(c, false));
            makeTex(scene, 'goomba_w', 32, 34, c => goomba(c, true));

            // Koopa (chaser – green shell)

                c.beginPath(); c.arc(15, 22, 13, 0, Math.PI * 2); c.fill();

                c.fillStyle = '#f9a825'; c.fillRect(6, 3, 18, 16);
                c.beginPath(); c.arc(15, 3, 9, Math.PI, 0); c.fill();
                c.fillStyle = '#fff'; c.fillRect(8, 5, 7, 6); c.fillRect(15, 5, 7, 6);

                c.fillStyle = '#f9a825'; c.beginPath(); c.arc(12, 12, 11, 0, Math.PI * 2); c.fill();
                c.fillStyle = '#fff'; c.font = 'bold 14px Arial'; c.textAlign = 'center'; c.fillText('★', 12, 17);

            // ── Environment ────────────────────────────────────────────
            makeTex(scene, 'spike', 16, 22, c => {
                c.fillStyle = '#9e9e9e'; c.beginPath(); c.moveTo(0, 22); c.lineTo(8, 0); c.lineTo(16, 22); c.fill();
                c.fillStyle = '#e0e0e0'; c.beginPath(); c.moveTo(5, 22); c.lineTo(8, 8); c.lineTo(11, 22); c.fill();
            });
            makeTex(scene, 'flagpole', 8, 160, c => {
                c.fillStyle = '#bdbdbd'; c.fillRect(2, 0, 4, 160);
                c.fillStyle = '#9e9e9e'; c.fillRect(0, 0, 8, 6);
            });
            makeTex(scene, 'flagbanner', 40, 28, c => {

                c.fillStyle = '#f44336'; c.fillRect(16, 10, 8, 8);

            makeTex(scene, 'cloud', 80, 38, c => {
                c.fillStyle = 'rgba(255,255,255,0.13)';
                c.beginPath(); c.arc(20, 28, 17, 0, Math.PI * 2); c.fill();
                c.beginPath(); c.arc(40, 20, 22, 0, Math.PI * 2); c.fill();
                c.beginPath(); c.arc(62, 28, 15, 0, Math.PI * 2); c.fill();

            makeTex(scene, 'mountain', 100, 90, c => {

            makeTex(scene, 'particle', 8, 8, c => {
                const g = c.createRadialGradient(4, 4, 0, 4, 4, 4);

        // ═══════════════════════════════════════════════════════════════
        //  MEGA BRO — MenuScene COMPLETE (Pro Version)
        //  Drop-in replacement for your existing MenuScene class.

        // ═══════════════════════════════════════════════════════════════

        // ──────────────────────────────────────────────────────────────
        //  SAVE HELPERS  (utilisé par le menu ET GameScene)
        // ──────────────────────────────────────────────────────────────
        const Save = {
            KEY: 'megabro_save',
            defaults: () => ({ best: 0, last: 0, games: 0, maxLevel: 0, mute: false }),

            load() {
                try { return { ...this.defaults(), ...JSON.parse(localStorage.getItem(this.KEY)) }; }
                catch { return this.defaults(); }
            },
            write(data) { localStorage.setItem(this.KEY, JSON.stringify(data)); },

            update(patch) { this.write({ ...this.load(), ...patch }); },

            // Compatibilité : met à jour depuis l'ancienne clé si besoin
            migrate() {
                const old = localStorage.getItem('megabro_best');
                if (old) {
                    const d = this.load();
                    if (Number(old) > d.best) { d.best = Number(old); this.write(d); }
                    localStorage.removeItem('megabro_best');
                }
            }
        };

        // ──────────────────────────────────────────────────────────────
        //  MENU SCENE
        // ──────────────────────────────────────────────────────────────
        class MenuScene extends Phaser.Scene {
            constructor() { super({ key: 'MenuScene' }); }

            // ── init ────────────────────────────────────────────────────
            init() {
                this._stars = [];
                this._muteBtn = null;
                this._view = 'main'; // 'main' | 'scores' | 'controls'
                this._panels = {};     // stocke les conteneurs de vues
            }

            // ── create ──────────────────────────────────────────────────
            create() {
                SFX.init();
                const save = Save.load();
                if (!save.mute) SFX.startBg(0);
                buildAllTextures(this);

                this._buildBg();
                this._buildStars();
                this._buildTitle();
                this._buildMainPanel(save);
                this._buildScoresPanel(save);
                this._buildControlsPanel();
                this._showView('main');

                this.cameras.main.fadeIn(600);
            }

            // ── fond dégradé ────────────────────────────────────────────
            _buildBg() {
                const bg = this.add.graphics();
                bg.fillGradientStyle(0x1a1a4e, 0x1a1a4e, 0x0a0a2a, 0x0a0a2a, 1);
                bg.fillRect(0, 0, GW, GH);
            }

            // ── étoiles animées ─────────────────────────────────────────
            _buildStars() {
                for (let i = 0; i < 100; i++) {
                    const x = Phaser.Math.Between(0, GW);
                    const y = Phaser.Math.Between(0, GH);
                    const r = Phaser.Math.FloatBetween(0.5, 2.2);
                    const a0 = Phaser.Math.FloatBetween(0.1, 0.8);
                    const c = this.add.circle(x, y, r, 0xfff9c4, a0);

                    // Scintillement individuel
                    this.tweens.add({
                        targets: c,
                        alpha: { from: a0, to: a0 < 0.5 ? 1 : 0.1 },
                        scale: { from: 1, to: Phaser.Math.FloatBetween(0.6, 1.4) },
                        duration: Phaser.Math.Between(800, 3000),
                        yoyo: true, repeat: -1,
                        delay: Phaser.Math.Between(0, 2000),
                        ease: 'Sine.InOut'
                    });
                    this._stars.push(c);
                }

                // Quelques "étoiles filantes" périodiques
                this._scheduleShootingStar();
            }

            _scheduleShootingStar() {
                this.time.delayedCall(Phaser.Math.Between(3000, 8000), () => {
                    const y = Phaser.Math.Between(20, GH * 0.4);
                    const ln = this.add.graphics();
                    ln.lineStyle(2, 0xffffff, 0.8);
                    ln.lineBetween(0, 0, 60, 4);
                    ln.x = -70; ln.y = y; ln.alpha = 0.9;
                    this.tweens.add({
                        targets: ln,
                        x: GW + 80, y: y + 30,
                        alpha: 0,
                        duration: 700, ease: 'Quad.In',
                        onComplete: () => ln.destroy()
                    });
                    this._scheduleShootingStar();
                });
            }

            // ── titre animé ─────────────────────────────────────────────
            _buildTitle() {
                const title = this.add.text(GW / 2, 88, 'MEGA BRO', {
                    fontSize: '72px', fontFamily: 'Courier New', fontStyle: 'bold',
                    color: '#FFD700', stroke: '#FF4500', strokeThickness: 8,
                    shadow: { offsetX: 5, offsetY: 5, color: '#8B0000', blur: 0, fill: true }
                }).setOrigin(0.5);

                // Lévitation
                this.tweens.add({
                    targets: title,
                    y: title.y - 10,
                    duration: 1800, yoyo: true, repeat: -1, ease: 'Sine.InOut'
                });

                // Pulsation de couleur (via tint)
                this.tweens.addCounter({
                    from: 0, to: 100, duration: 2000,
                    yoyo: true, repeat: -1,
                    onUpdate: t => {
                        const v = Math.floor(t.getValue() * 2.55);
                        // teinte dorée → orange vif
                        title.setTint(Phaser.Display.Color.GetColor(255, 215 - v * 0.4, v * 0.2));
                    }
                });

                this.add.text(GW / 2, 168, '✦  SUPER PLATFORMER  ✦', {
                    fontSize: '18px', fontFamily: 'Courier New', color: '#aaddff'

                [

            // ── gestion des vues ─────────────────────────────────────────
            _showView(name) {
                this._view = name;
                Object.entries(this._panels).forEach(([k, panel]) => {
                    panel.setVisible(k === name);
                });

                // Slide-in depuis la droite
                const p = this._panels[name];
                if (p) {
                    p.x = name === 'main' ? 0 : GW * 0.08;
                    this.tweens.add({ targets: p, x: 0, duration: 300, ease: 'Back.Out' });
                }
            }

            // ── bouton réutilisable ──────────────────────────────────────
            /**
             * Crée un bouton arrondi dans un container.
             * @returns {{ g: Graphics, label: Text }}
             */
            _btn(container, x, y, label, col, hov, cb) {
                const W = 240, H = 50, R = 12;
                const g = this.add.graphics();

                const draw = c => {
                    g.clear();
                    g.fillStyle(c, 1);
                    g.fillRoundedRect(x - W / 2, y - H / 2, W, H, R);
                    g.lineStyle(2, 0xffffff, 0.2);
                    g.strokeRoundedRect(x - W / 2, y - H / 2, W, H, R);
                };
                draw(col);

                g.setInteractive(
                    new Phaser.Geom.Rectangle(x - W / 2, y - H / 2, W, H),
                    Phaser.Geom.Rectangle.Contains
                );

                g.on('pointerover', () => { draw(hov); });
                g.on('pointerout', () => { draw(col); });
                g.on('pointerdown', () => {
                    // Bounce visuel au clic
                    this.tweens.add({
                        targets: txt,
                        scaleX: 0.88, scaleY: 0.88,
                        duration: 80, yoyo: true, ease: 'Quad.Out',
                        onStart: () => { draw(hov); },
                        onComplete: () => { draw(col); cb(); }
                    });
                });

                const txt = this.add.text(x, y, label, {
                    fontSize: '20px', fontFamily: 'Courier New', fontStyle: 'bold', color: '#fff'
                }).setOrigin(0.5);

                if (container) { container.add(g); container.add(txt); }

                // expose le texte pour le mute toggle
                const ref = { g, label: txt };
                return ref;
            }
        }

        // ═══════════════════════════════════════════════════════════════
        //  SCENE: GAME (main) — VERSION BOOSTÉE
        // ═══════════════════════════════════════════════════════════════
        class GameScene extends Phaser.Scene {
            constructor() { super({ key: 'GameScene' }); }

            // ─── PRELOAD ────────────────────────────────────────────────
            preload() { buildAllTextures(this); }

            // ─── CREATE ─────────────────────────────────────────────────
            create(data) {
                this.li = data.level || 0;
                this.score = data.score || 0;
                this.lives = data.lives !== undefined ? data.lives : 3;
                this.ld = LEVELS[this.li];

                this.dead = false;
                this.done = false;
                this.invinc = false;
                this.spdBoost = false;
                this.jmpBoost = false;
                this.ptimers = {};
                this._pjump = false;

                // ── NOUVEAUX ÉTATS ───────────────────────────────────────
                this.hitStun = false;          // invincibilité courte après dégât
                this.hitStunTimer = 0;
                this.HIT_STUN_DURATION = 1800; // ms d'invincibilité après dégât
                this.combo = data.combo || 0;  // combo stomp
                this.lastStompTime = 0;
                this.COMBO_WINDOW = 1200;      // ms pour chaîner les stomps
                this.speedMultiplier = 1.0;    // accélération progressive
                this.distanceTraveled = 0;     // pour déclencher l'accélération
                this._lastPlayerX = 0;
                this._stepTimer = 0;           // timer sons de pas
                this._wasOnGround = false;     // détection atterrissage
                this._dangerMusic = false;     // état musique dynamique

                this.BASE_SPD = 200;
                this.BASE_JMP = -520;

                SFX.resume(); SFX.startBg(this.li);

                this.physics.world.setBounds(0, 0, this.ld.worldW, GH + 200);
                this.cameras.main.setBounds(0, 0, this.ld.worldW, GH);

                this._makeBg();
                this._makeGround();
                this._makePlatforms();
                this._makeMovingPlatforms();
                this._makeBlocks();
                this._makeCoins();
                this._makeSpikes();
                this._makePowerups();
                this._makeEnemies();
                this._makeFlag();
                this._makePlayer();
                this._makeHUD();
                this._setupKeys();
                this._setupCollisions();

                this.cameras.main.startFollow(this.player, true, 0.09, 0.09);
                this.cameras.main.fadeIn(500);
            }

            // ─── BACKGROUND (thèmes selon niveau) ───────────────────────
            _makeBg() {
                const ld = this.ld;
                // Thème selon niveau : 0=forêt, 1=nuit, 2=lave
                const theme = this.li % 3;

                const bg = this.add.graphics().setScrollFactor(0);
                bg.fillGradientStyle(ld.bg1, ld.bg1, ld.bg2, ld.bg2, 1);
                bg.fillRect(0, 0, GW, GH);

                if (theme === 1) {
                    // NUIT : étoiles scintillantes
                    const sg = this.add.graphics().setScrollFactor(0.04);
                    for (let i = 0; i < 180; i++) {
                        sg.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.2, 1.0));
                        sg.fillCircle(Phaser.Math.Between(0, ld.worldW), Phaser.Math.Between(0, GH * 0.75), Phaser.Math.FloatBetween(0.5, 2.5));
                    }
                    // Lune
                    const moon = this.add.graphics().setScrollFactor(0.05);
                    moon.fillStyle(0xfffde7, 0.9);
                    moon.fillCircle(GW - 100, 70, 38);
                    moon.fillStyle(0x0a0a2a, 1);
                    moon.fillCircle(GW - 86, 60, 32); // ombre croissant

                } else if (theme === 2) {
                    // LAVE : particules de braise
                    const sg = this.add.graphics().setScrollFactor(0.06);
                    for (let i = 0; i < 80; i++) {
                        const a = Phaser.Math.FloatBetween(0.15, 0.7);
                        sg.fillStyle(Phaser.Math.Between(0) ? 0xff4500 : 0xff8c00, a);
                        sg.fillCircle(Phaser.Math.Between(0, ld.worldW), Phaser.Math.Between(GH * 0.3, GH), Phaser.Math.FloatBetween(1, 4));
                    }
                    // Effet de brume de lave en bas
                    const lavaGlow = this.add.graphics().setScrollFactor(0.1).setAlpha(0.22);
                    lavaGlow.fillStyle(0xff2200, 1);
                    lavaGlow.fillRect(0, GH - 80, ld.worldW, 80);

                } else {
                    // FORÊT : arbres + étoiles
                    const sg = this.add.graphics().setScrollFactor(0.06);
                    for (let i = 0; i < 80; i++) {
                        sg.fillStyle(0xfff9c4, Phaser.Math.FloatBetween(0.1, 0.7));
                        sg.fillCircle(Phaser.Math.Between(0, ld.worldW), Phaser.Math.Between(0, GH * 0.5), Phaser.Math.FloatBetween(0.5, 2));
                    }
                    // Silhouettes d'arbres au fond
                    const trees = this.add.graphics().setScrollFactor(0.12).setAlpha(0.3);
                    for (let i = 0; i < 30; i++) {
                        const tx = i * 200 + Phaser.Math.Between(-30, 30);
                        const th = Phaser.Math.Between(80, 160);
                        trees.fillStyle(0x1a4a1a, 1);
                        trees.fillTriangle(tx, GH - 30, tx - 40, GH - 30 + th, tx + 40, GH - 30 + th);
                        trees.fillRect(tx - 8, GH - 30 + th, 16, 30);
                    }
                }

                for (let i = 0; i < 22; i++)
                    this.add.image(i * 240 + 70, GH - 60, 'mountain').setScrollFactor(0.2).setAlpha(theme === 1 ? 0.3 : 0.55).setScale(Phaser.Math.FloatBetween(0.7, 1.4));
                for (let i = 0; i < 35; i++)
                    this.add.image(Phaser.Math.Between(0, ld.worldW), Phaser.Math.Between(30, GH * 0.42), 'cloud')
                        .setScrollFactor(Phaser.Math.FloatBetween(0.18, 0.45)).setAlpha(theme === 2 ? 0.3 : 0.8);
            }

            // ─── GROUND ─────────────────────────────────────────────────
            _makeGround() {
                this.gGrp = this.physics.add.staticGroup();
                const gy = this.ld.groundY;
                this.ld.grounds.forEach(([s, e]) => {
                    for (let x = s; x < e; x += T)
                        for (let row = 0; row < 5; row++)
                            this.gGrp.create(x + T / 2, gy + row * T, 'ground').setOrigin(0.5, 0.5).refreshBody();
                });
            }

            // ─── STATIC PLATFORMS ───────────────────────────────────────
            _makePlatforms() {
                this.platGrp = this.physics.add.staticGroup();
                this.ld.platforms.forEach(({ x, y, w }) => {
                    for (let i = 0; i < w; i++)
                        this.platGrp.create(x + i * T + T / 2, y, 'plat').setOrigin(0.5, 0.5).refreshBody();
                });
            }

            // ─── MOVING PLATFORMS ───────────────────────────────────────
            _makeMovingPlatforms() {
                this.mplatGrp = this.physics.add.group({ immovable: true, allowGravity: false });
                this.ld.movingPlatforms.forEach(({ x, y, w, dx, dy, type }) => {
                    const tiles = [];
                    for (let i = 0; i < w; i++) {
                        const s = this.mplatGrp.create(x + i * T + T / 2, y, 'mplat').setOrigin(0.5, 0.5);
                        s.body.allowGravity = false;
                        tiles.push(s);
                    }
                    // Plateformes plus rapides avec l'avancement du joueur
                    const spd = 1 + this.li * 0.2;
                    if (type === 'h') {
                        this.tweens.add({ targets: tiles, x: `+=${dx || 70}`, duration: Math.round(2000 / spd), yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                    } else {
                        this.tweens.add({ targets: tiles, y: `+=${dy || 60}`, duration: Math.round(1800 / spd), yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                    }
                });
            }

            // ─── BLOCKS ─────────────────────────────────────────────────
            _makeBlocks() {
                this.brickGrp = this.physics.add.staticGroup();
                this.ld.bricks.forEach(({ x, y }) => {
                    const b = this.brickGrp.create(x + T / 2, y, 'brick').setOrigin(0.5, 0.5);
                    b.refreshBody();
                });
                this.qGrp = this.physics.add.staticGroup();
                this.ld.itemBlocks.forEach(({ x, y, item }) => {
                    const b = this.qGrp.create(x + T / 2, y, 'qblock').setOrigin(0.5, 0.5);
                    b.item = item; b.used = false;
                    b.refreshBody();
                });
            }

            // ─── COINS ──────────────────────────────────────────────────
            _makeCoins() {
                this.coinGrp = this.physics.add.staticGroup();
                this.ld.coins.forEach(([sx, sy, n, gap]) => {
                    for (let i = 0; i < n; i++) {
                        const c = this.coinGrp.create(sx + i * gap + 10, sy, 'coin').setOrigin(0.5, 0.5);
                        c.refreshBody();
                        this.tweens.add({ targets: c, y: sy - 7, duration: 700 + i * 70, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
                    }
                });
            }

            // ─── SPIKES ─────────────────────────────────────────────────
            _makeSpikes() {
                this.spikeGrp = this.physics.add.staticGroup();
                this.ld.spikes.forEach(({ x, y, n }) => {
                    for (let i = 0; i < n; i++) {
                        const s = this.spikeGrp.create(x + i * 16 + 8, y, 'spike').setOrigin(0.5, 0.5);
                        s.setSize(14, 18).refreshBody();
                    }
                });
            }

            // ─── POWERUPS GROUP ─────────────────────────────────────────
            _makePowerups() {
                this.puGrp = this.physics.add.staticGroup();
            }

            _spawnPU(x, y, type) {
                if (type === 'coin') {
                    this._score(100); this._float(x, y - 20, '+100', '#FFD700'); SFX.coin(); return;
                }
                const key = { speed: 'pu_spd', jump: 'pu_jmp', invincible: 'pu_inv' }[type] || 'pu_spd';
                const pu = this.puGrp.create(x, y - T, key).setOrigin(0.5, 0.5);
                pu.puType = type; pu.refreshBody();
                this.tweens.add({ targets: pu, y: (y - T) - 10, duration: 600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            }

            // ─── ENEMIES (vitesse progressive selon niveau) ───────────────
            _makeEnemies() {
                this.enemyGrp = this.physics.add.group();
                // Multiplicateur de vitesse ennemi selon niveau
                const eSpd = 1 + this.li * 0.25 + (this.speedMultiplier - 1) * 0.5;

                this.ld.enemies.forEach(({ t, x, y }) => {
                    const isK = (t === 'k');
                    const e = this.enemyGrp.create(x, y, isK ? 'koopa' : 'goomba');
                    e.setGravityY(300);
                    e.setSize(isK ? 26 : 28, isK ? 36 : 30);
                    e.etype = t; e.dir = -1; e.wf = 0; e.wt = 0; e.alive = true;
                    e.baseSpd = isK ? 70 * eSpd : 60 * eSpd;
                    e.setVelocityX(-e.baseSpd);
                });
            }

            // ─── FLAG ───────────────────────────────────────────────────
            _makeFlag() {
                const fx = this.ld.flagX, gy = this.ld.groundY;
                this.flagPole = this.physics.add.staticImage(fx, gy - 80, 'flagpole').setOrigin(0.5, 1).refreshBody();
                this.flagBnr = this.physics.add.staticImage(fx, gy - 220, 'flagbanner').setOrigin(0, 0.5).refreshBody();
                this.tweens.add({ targets: this.flagBnr, angle: { from: -2, to: 2 }, duration: 900, yoyo: true, repeat: -1 });
            }

            // ─── PLAYER ─────────────────────────────────────────────────
            _makePlayer() {
                this.player = this.physics.add.sprite(80, this.ld.groundY - 60, 'p_idle');
                this.player.setCollideWorldBounds(true);
                this.player.setGravityY(400);
                this.player.setSize(22, 50);
                this.player.setBounce(0.04);
                this.player.wf = 0; this.player.wt = 0;
                this._lastPlayerX = this.player.x;
            }

            // ─── HUD (modernisé) ────────────────────────────────────────
            _makeHUD() {
                const s = { fontFamily: 'Courier New', fontSize: '15px', fontStyle: 'bold', color: '#fff', stroke: '#000', strokeThickness: 4 };

                // Fond semi-transparent HUD
                this._hudBg = this.add.graphics().setScrollFactor(0).setDepth(19);
                this._hudBg.fillStyle(0x000000, 0.45);
                this._hudBg.fillRoundedRect(4, 4, 200, 68, 8);
                this._hudBg.fillRoundedRect(GW / 2 - 50, 4, 100, 24, 8);
                this._hudBg.fillRoundedRect(GW - 110, 4, 106, 40, 8);

                this.hudSc = this.add.text(10, 10, `⭐ ${this.score}`, s).setScrollFactor(0).setDepth(20);
                this.hudLv = this.add.text(10, 30, `❤️  ${this.lives}`, s).setScrollFactor(0).setDepth(20);
                this.hudTm = this.add.text(GW / 2, 10, `⏱ ${this.ld.timeLimit}`, s).setScrollFactor(0).setDepth(20).setOrigin(0.5, 0);
                this.hudNm = this.add.text(GW - 10, 10, `Niveau ${this.li + 1}`, s).setScrollFactor(0).setDepth(20).setOrigin(1, 0);
                this.hudPw = this.add.text(10, 52, '', { ...s, fontSize: '12px', color: '#FFD700' }).setScrollFactor(0).setDepth(20);
                this.hudBs = this.add.text(GW - 10, 28, `Best: ${localStorage.getItem('megabro_best') || 0}`,
                    { ...s, fontSize: '12px', color: '#aaddff' }).setScrollFactor(0).setDepth(20).setOrigin(1, 0);

                // Affichage combo
                this.hudCombo = this.add.text(GW / 2, 38, '', {
                    fontFamily: 'Courier New', fontSize: '16px', fontStyle: 'bold',
                    color: '#FF6B35', stroke: '#000', strokeThickness: 4
                }).setScrollFactor(0).setDepth(20).setOrigin(0.5, 0);

                // Barre de vitesse progressive (visuelle)
                this._speedBarBg = this.add.graphics().setScrollFactor(0).setDepth(20);
                this._speedBar = this.add.graphics().setScrollFactor(0).setDepth(20);
                this._drawSpeedBar();

                this.timeLeft = this.ld.timeLimit;
                this.timerEv = this.time.addEvent({
                    delay: 1000, repeat: this.ld.timeLimit - 1,
                    callback: () => {
                        if (this.dead || this.done) return;
                        this.timeLeft--;
                        this.hudTm.setText(`⏱ ${this.timeLeft}`);
                        if (this.timeLeft <= 10) this.hudTm.setColor('#ff4444');
                        if (this.timeLeft <= 0) this._die();
                        // Musique dynamique danger
                        if (this.timeLeft <= 15 && !this._dangerMusic) {
                            this._dangerMusic = true;
                            SFX.switchToDanger && SFX.switchToDanger();
                        }
                    }
                });
            }

            _drawSpeedBar() {
                const bw = 80, bh = 6, bx = GW - 10 - bw, by = GH - 16;
                this._speedBarBg.clear();
                this._speedBarBg.fillStyle(0x333333, 0.7);
                this._speedBarBg.fillRoundedRect(bx, by, bw, bh, 3);

                this._speedBar.clear();
                const ratio = Math.min((this.speedMultiplier - 1) / 0.8, 1); // max +80%
                const color = ratio < 0.5 ? 0x44ff44 : ratio < 0.8 ? 0xffaa00 : 0xff2200;
                this._speedBar.fillStyle(color, 1);
                this._speedBar.fillRoundedRect(bx, by, Math.round(bw * ratio), bh, 3);
            }

            _refreshHUD() {
                this.hudSc.setText(`⭐ ${this.score}`);
                this.hudLv.setText(`❤️  ${this.lives}`);
                const best = parseInt(localStorage.getItem('megabro_best') || 0);
                this.hudBs.setText(`Best: ${Math.max(this.score, best)}`);
                this._drawSpeedBar();
            }

            // ─── KEYBOARD ───────────────────────────────────────────────
            _setupKeys() {
                this.keys = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys({
                    left: 'A', right: 'D', up: 'W', space: Phaser.Input.Keyboard.KeyCodes.SPACE
                });
            }

            // ─── COLLISIONS ─────────────────────────────────────────────
            _setupCollisions() {
                const p = this.player;

                this.physics.add.collider(p, this.gGrp);
                this.physics.add.collider(p, this.platGrp);
                this.physics.add.collider(p, this.mplatGrp);

                this.physics.add.collider(this.enemyGrp, this.gGrp, (_, e) => this._eFlip(e));
                this.physics.add.collider(this.enemyGrp, this.platGrp, (_, e) => this._eFlip(e));

                this.physics.add.collider(p, this.brickGrp, (player, brick) => {
                    if (player.body.blocked.up && player.body.velocity.y < 0) this._breakBrick(brick);
                });

                this.physics.add.collider(p, this.qGrp, (player, block) => {
                    if (player.body.blocked.up && player.body.velocity.y < 0 && !block.used)
                        this._activateQ(block);
                });

                // Contact ennemi → dégât pro (recul + hitStun) au lieu de mort directe
                this.physics.add.overlap(p, this.enemyGrp, (player, enemy) => {
                    if (!enemy.alive) return;
                    if (this.invinc) { this._killEnemy(enemy); return; }
                    if (player.body.velocity.y > 0 && player.body.bottom < enemy.body.top + 16) {
                        this._stomp(enemy);
                    } else {
                        this._takeDamage(enemy);
                    }
                });

                this.physics.add.overlap(p, this.coinGrp, (player, coin) => {
                    coin.destroy(); SFX.coin();
                    this._score(100); this._float(coin.x, coin.y - 20, '+100', '#FFD700');
                    this._coinEffect(coin.x, coin.y);
                });

                this.physics.add.overlap(p, this.puGrp, (player, pu) => {
                    this._applyPU(pu.puType); pu.destroy();
                });

                // Spikes : dégât, pas mort directe si vies > 1
                this.physics.add.overlap(p, this.spikeGrp, () => {
                    if (!this.invinc && !this.hitStun) this._takeDamage(null, true);
                });

                this.physics.add.overlap(p, this.flagBnr, () => this._levelDone());
                this.physics.add.overlap(p, this.flagPole, () => this._levelDone());
            }

            _eFlip(e) {
                if (e.body.blocked.left || e.body.blocked.right) {
                    e.dir *= -1;
                    e.setVelocityX(e.baseSpd * e.dir);
                }
            }

            // ─── BLOCK MECHANICS ────────────────────────────────────────
            _breakBrick(brick) {
                SFX.brick();
                this._particles(brick.x, brick.y, 0x8d6e63, 8);
                this.cameras.main.shake(80, 0.006); // screen shake léger
                brick.destroy();
                this._score(50);
            }

            _activateQ(block) {
                block.used = true;
                block.setTexture('qused').refreshBody();
                SFX.powerup();
                this.tweens.add({ targets: block, y: block.y - 9, duration: 90, yoyo: true });
                this._spawnPU(block.x, block.y, block.item);
            }

            // ─── STOMP + COMBO ──────────────────────────────────────────
            _stomp(e) {
                const now = this.time.now;
                const timeSinceLast = now - this.lastStompTime;

                // Combo si dans la fenêtre de temps
                if (timeSinceLast < this.COMBO_WINDOW && this.lastStompTime > 0) {
                    this.combo++;
                } else {
                    this.combo = 1;
                }
                this.lastStompTime = now;

                const comboBonus = this.combo * 200;
                SFX.stomp();
                this._score(comboBonus);

                if (this.combo >= 2) {
                    this._float(e.x, e.y - 20, `COMBO x${this.combo} +${comboBonus}!`, '#FF6B35');
                    this.cameras.main.shake(60 + this.combo * 20, 0.003 + this.combo * 0.002);
                    this._particles(e.x, e.y, 0xFF6B35, 6 + this.combo * 2);
                    // Rebond plus haut selon combo
                    this.player.setVelocityY(-390 - this.combo * 30);
                    SFX.comboStomp && SFX.comboStomp(this.combo);
                } else {
                    this._float(e.x, e.y - 20, `+${comboBonus}`, '#FF5252');
                    this.cameras.main.shake(50, 0.004);
                    this.player.setVelocityY(-390);
                }

                // Affichage combo HUD
                if (this.combo >= 2) {
                    this.hudCombo.setText(`🔥 COMBO x${this.combo}`);
                    if (this._comboHideTween) this._comboHideTween.remove();
                    this._comboHideTween = this.time.delayedCall(1500, () => {
                        this.tweens.add({ targets: this.hudCombo, alpha: 0, duration: 400, onComplete: () => this.hudCombo.setAlpha(1).setText('') });
                    });
                }

                this._killEnemy(e);
            }

            _killEnemy(e) {
                e.alive = false; e.setActive(false);
                this.tweens.add({ targets: e, scaleY: 0.05, alpha: 0, y: e.y + 10, duration: 240, onComplete: () => e.destroy() });
                this._particles(e.x, e.y, 0x795548, 6);
            }

            // ─── PRISE DE DÉGÂT PRO (recul + hitStun + pas mort directe) ──
            _takeDamage(enemy, isSpike = false) {
                if (this.dead || this.done || this.invinc || this.hitStun) return;

                this.lives--;
                SFX.death();

                // Screen shake selon dégât
                this.cameras.main.shake(isSpike ? 300 : 250, isSpike ? 0.018 : 0.014);
                this.cameras.main.flash(200, isSpike ? 255 : 200, 0, 0);

                // Recul du joueur
                const knockDir = enemy ? (this.player.x < enemy.x ? -1 : 1) : (this.player.body.velocity.x < 0 ? 1 : -1);
                this.player.setVelocityX(knockDir * 280);
                this.player.setVelocityY(-320);

                // Flash rouge joueur
                this.player.setTint(0xff3300);
                this.time.delayedCall(120, () => this.player.clearTint());

                // HitStun (invincibilité courte + clignotement)
                this.hitStun = true;
                if (this._hitTw) this._hitTw.stop();
                this._hitTw = this.tweens.add({ targets: this.player, alpha: 0.3, duration: 100, yoyo: true, repeat: -1 });

                this.time.delayedCall(this.HIT_STUN_DURATION, () => {
                    this.hitStun = false;
                    if (this._hitTw) { this._hitTw.stop(); this._hitTw = null; }
                    this.player.setAlpha(1);
                });

                // Float dégât
                this._float(this.player.x, this.player.y - 30, isSpike ? '💥 SPIKE!' : '💢 -1 VIE', '#ff4444');
                this._refreshHUD();

                // Mort si plus de vies
                if (this.lives <= 0) {
                    this._die();
                }
            }

            // ─── POWER-UPS ──────────────────────────────────────────────
            _applyPU(type) {
                SFX.powerup();
                this._float(this.player.x, this.player.y - 30, type.toUpperCase() + '!', '#FFD700');
                this._particles(this.player.x, this.player.y, 0xFFD700, 12);
                if (this.ptimers[type]) this.ptimers[type].remove();
                const dur = 8000;
                const msgMap = { speed: '⚡ VITESSE', jump: '↑ SUPER SAUT', invincible: '★ INVINCIBLE' };

                if (type === 'speed') {
                    this.spdBoost = true;
                    this.hudPw.setText(msgMap.speed);
                    this.ptimers.speed = this.time.delayedCall(dur, () => { this.spdBoost = false; this.hudPw.setText(''); });
                } else if (type === 'jump') {
                    this.jmpBoost = true;
                    this.hudPw.setText(msgMap.jump);
                    this.ptimers.jump = this.time.delayedCall(dur, () => { this.jmpBoost = false; this.hudPw.setText(''); });
                } else if (type === 'invincible') {
                    this.invinc = true;
                    this.hudPw.setText(msgMap.invincible);
                    if (this._invTw) this._invTw.stop();
                    this._invTw = this.tweens.add({ targets: this.player, alpha: 0.35, duration: 180, yoyo: true, repeat: -1 });
                    this.ptimers.invincible = this.time.delayedCall(dur, () => {
                        this.invinc = false;
                        if (this._invTw) { this._invTw.stop(); }
                        this.player.setAlpha(1);
                        this.hudPw.setText('');
                    });
                }
                this._score(500);
            }

            // ─── MORT JOUEUR ────────────────────────────────────────────
            _die() {
                if (this.dead || this.done) return;
                this.dead = true;
                this.lives = Math.max(this.lives, 0);
                SFX.death();
                if (this.timerEv) this.timerEv.remove();
                this.cameras.main.shake(500, 0.025);
                this.cameras.main.flash(400, 200, 0, 0);
                this.player.setTint(0xff0000);
                this.player.setVelocityY(-380);
                this._saveBest();

                this.time.delayedCall(1100, () => {
                    SFX.stopBg();
                    this.cameras.main.fadeOut(500);
                    this.time.delayedCall(500, () => {
                        if (this.lives <= 0) {
                            this.scene.start('GameOverScene', { score: this.score, level: this.li });
                        } else {
                            this.scene.start('GameScene', { level: this.li, score: this.score, lives: this.lives });
                        }
                    });
                });
            }

            // ─── LEVEL DONE ─────────────────────────────────────────────
            _levelDone() {
                if (this.done || this.dead) return;
                this.done = true;
                SFX.lvlDone();
                if (this.timerEv) this.timerEv.remove();

                // Bonus combo final
                const comboBonus = this.combo >= 3 ? this.combo * 300 : 0;
                const bonus = 1000 + this.timeLeft * 50 + comboBonus;
                this._score(bonus);
                this._float(this.player.x, this.player.y - 50, `+${bonus}!`, '#FFD700');
                if (comboBonus > 0) this._float(this.player.x, this.player.y - 80, `🔥 COMBO BONUS +${comboBonus}!`, '#FF6B35');

                this._particles(this.player.x, this.player.y, 0xFFD700, 20);
                this.cameras.main.shake(200, 0.01);
                this.player.body.enable = false;
                this.tweens.add({ targets: this.player, y: this.player.y - 80, duration: 500, ease: 'Back.easeOut' });
                this._saveBest();

                this.time.delayedCall(2200, () => {
                    SFX.stopBg();
                    this.cameras.main.fadeOut(600);
                    const next = this.li + 1;
                    this.time.delayedCall(600, () => {
                        if (next < LEVELS.length)
                            this.scene.start('LevelIntroScene', { level: next, score: this.score, lives: this.lives, combo: this.combo });
                        else
                            this.scene.start('WinScene', { score: this.score });
                    });
                });
            }

            // ─── SCORE / SAVE ───────────────────────────────────────────
            _score(n) {
                this.score += n;
                this._refreshHUD();
            }
            _saveBest() {
                const b = parseInt(localStorage.getItem('megabro_best') || 0);
                if (this.score > b) localStorage.setItem('megabro_best', this.score);
            }

            // ─── EFFETS VISUELS ─────────────────────────────────────────
            _float(x, y, msg, col = '#FFD700') {
                const t = this.add.text(x, y, msg, {
                    fontSize: '18px', fontFamily: 'Courier New', fontStyle: 'bold',
                    color: col, stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5).setDepth(15);
                this.tweens.add({ targets: t, y: y - 55, alpha: 0, duration: 950, ease: 'Power1', onComplete: () => t.destroy() });
            }

            _particles(x, y, color, n) {
                const em = this.add.particles(x, y, 'particle', {
                    speed: { min: 60, max: 200 }, angle: { min: 0, max: 360 },
                    scale: { start: 1, end: 0 }, alpha: { start: 1, end: 0 },
                    lifespan: { min: 300, max: 600 }, gravityY: 300,
                    quantity: n, tint: color
                });
                this.time.delayedCall(700, () => em.destroy());
            }

            // Effet visuel pièce collectée (cercle flash)
            _coinEffect(x, y) {
                const g = this.add.graphics().setDepth(14);
                g.lineStyle(2, 0xFFD700, 1);
                g.strokeCircle(x, y, 8);
                this.tweens.add({ targets: g, scaleX: 2.5, scaleY: 2.5, alpha: 0, duration: 300, ease: 'Power2', onComplete: () => g.destroy() });
            }

            // ─── UPDATE ─────────────────────────────────────────────────
            update(_t, dt) {
                if (this.dead || this.done) return;

                if (this.player.y > GH + 80) this._die();

                this._updateSpeedProgression(dt);
                this._updatePlayer(dt);
                this._updateEnemies(dt);
                this._updateMusicDynamic();
            }

            // ─── VITESSE PROGRESSIVE ────────────────────────────────────
            _updateSpeedProgression(dt) {
                const dx = Math.abs(this.player.x - this._lastPlayerX);
                this.distanceTraveled += dx;
                this._lastPlayerX = this.player.x;

                // Accélération progressive : +0.1 tous les 1000px parcourus
                const newMult = 1.0 + Math.min(this.distanceTraveled / 10000, 0.8);
                if (Math.abs(newMult - this.speedMultiplier) > 0.05) {
                    this.speedMultiplier = newMult;
                    this._refreshHUD();
                    // Feedback visuel quand on accélère
                    if (newMult > 1.3 && Math.floor(newMult * 10) % 2 === 0) {
                        this._float(this.player.x, this.player.y - 40, '⚡ SPEED UP!', '#44ffff');
                    }
                }
            }

            // ─── MUSIQUE DYNAMIQUE ──────────────────────────────────────
            _updateMusicDynamic() {
                const ennemisProches = this.enemyGrp.children.entries.filter(e =>
                    e.alive && e.active && Math.abs(e.x - this.player.x) < 160
                ).length;

                const danger = ennemisProches >= 2 || this.timeLeft <= 15;
                if (danger && !this._dangerMusic) {
                    this._dangerMusic = true;
                    SFX.switchToDanger && SFX.switchToDanger();
                } else if (!danger && this._dangerMusic) {
                    this._dangerMusic = false;
                    SFX.switchToNormal && SFX.switchToNormal();
                }
            }

            // ─── PLAYER UPDATE (contrôles fluides + sons de pas) ────────
            _updatePlayer(dt) {
                const p = this.player;
                const LEFT = this.keys.left.isDown || this.wasd.left.isDown || touch.left;
                const RIGHT = this.keys.right.isDown || this.wasd.right.isDown || touch.right;
                const JUMP = this.keys.up.isDown || this.wasd.up.isDown ||
                    this.keys.space.isDown || this.wasd.space.isDown || touch.jump;

                const jumpNow = JUMP && !this._pjump;
                this._pjump = JUMP;

                const onGround = p.body.blocked.down;

                // ── Vitesse progressive ──
                const baseSpd = this.BASE_SPD * this.speedMultiplier;
                const spd = this.spdBoost ? baseSpd * 1.8 : baseSpd;

                // ── Saut variable selon vitesse ──
                const spdRatio = Math.abs(p.body.velocity.x) / baseSpd;
                const jmpMod = 1 + spdRatio * 0.12; // saut légèrement plus haut si on court vite
                const jmp = (this.jmpBoost ? this.BASE_JMP * 1.42 : this.BASE_JMP) * jmpMod;

                // ── Contrôles fluides : accélération progressive (pas de stop net) ──
                if (LEFT) {
                    const targetX = -spd;
                    const newVx = Phaser.Math.Linear(p.body.velocity.x, targetX, 0.18);
                    p.setVelocityX(newVx);
                    p.setFlipX(true);
                } else if (RIGHT) {
                    const targetX = spd;
                    const newVx = Phaser.Math.Linear(p.body.velocity.x, targetX, 0.18);
                    p.setVelocityX(newVx);
                    p.setFlipX(false);
                } else {
                    // Décélération douce (glisse légère)
                    const newVx = Phaser.Math.Linear(p.body.velocity.x, 0, onGround ? 0.22 : 0.06);
                    p.setVelocityX(Math.abs(newVx) < 5 ? 0 : newVx);
                }

                if (jumpNow && onGround) {
                    p.setVelocityY(jmp);
                    SFX.jump && SFX.jump(spdRatio); // son de saut variable selon vitesse
                }

                // ── Sons de pas ──
                if (onGround && (LEFT || RIGHT)) {
                    this._stepTimer += dt;
                    const stepInterval = Math.max(120, 300 - spdRatio * 100);
                    if (this._stepTimer > stepInterval) {
                        this._stepTimer = 0;
                        SFX.step && SFX.step();
                    }
                } else {
                    this._stepTimer = 0;
                }

                // ── Son d'atterrissage ──
                if (onGround && !this._wasOnGround) {
                    const fallSpd = Math.abs(p.body.velocity.y);
                    if (fallSpd > 100) {
                        this.cameras.main.shake(40 + fallSpd * 0.1, 0.003);
                        SFX.land && SFX.land(fallSpd);
                        if (fallSpd > 350) this._particles(p.x, p.body.bottom, 0xdddddd, 5);
                    }
                }
                this._wasOnGround = onGround;

                // ── Texture sélection ──
                if (this.invinc || this.hitStun) {
                    p.setTexture(this.invinc ? 'p_star' : 'p_idle');
                } else if (!onGround) {
                    p.setTexture('p_jump');
                } else if (LEFT || RIGHT) {
                    p.wt += dt;
                    const walkSpeed = Math.max(60, 130 - spdRatio * 50);
                    if (p.wt > walkSpeed) { p.wt = 0; p.wf = 1 - p.wf; }
                    p.setTexture(p.wf ? 'p_run' : 'p_idle');
                } else {
                    p.setTexture('p_idle');
                }
            }

            // ─── ENNEMIS UPDATE (IA améliorée + vitesse progressive) ────
            _updateEnemies(dt) {
                const px = this.player.x;
                const py = this.player.y;
                const eSpeedMod = this.speedMultiplier;

                this.enemyGrp.children.each(e => {
                    if (!e.alive || !e.active) return;

                    if (e.body.blocked.left || e.body.blocked.right) { e.dir *= -1; }

                    if (e.etype === 'k') {
                        // ── KOOPA : IA améliorée ──
                        const dist = Math.abs(px - e.x);
                        const vy = py - e.y;

                        // Saut si joueur est au-dessus et proche (IA de saut)
                        if (dist < 160 && vy < -40 && e.body.blocked.down) {
                            e.setVelocityY(-350);
                            SFX.enemyJump && SFX.enemyJump();
                        }

                        if (dist < 300) {
                            // Chasse agressive
                            e.dir = px < e.x ? -1 : 1;
                            const chaseSpd = Math.min(120, 95 * eSpeedMod + dist * 0.05);
                            e.setVelocityX(chaseSpd * e.dir);
                        } else {
                            // Patrouille
                            e.setVelocityX(70 * eSpeedMod * e.dir);
                        }
                    } else {
                        // ── GOOMBA : patrouille + accélération progressive ──
                        const baseV = 60 * eSpeedMod;
                        if (Math.abs(e.body.velocity.x) < 5) e.setVelocityX(baseV * e.dir);
                        else e.setVelocityX(baseV * e.dir);

                        // Légère détection : accélère si joueur proche
                        if (Math.abs(px - e.x) < 150) {
                            e.dir = px < e.x ? -1 : 1;
                            e.setVelocityX(85 * eSpeedMod * e.dir);
                        }
                    }

                    e.setFlipX(e.dir < 0);

                    // Animation marche (plus rapide avec vitesse)
                    e.wt += dt;
                    const walkAnim = Math.max(150, 320 / eSpeedMod);
                    if (e.wt > walkAnim) {
                        e.wt = 0; e.wf = 1 - e.wf;
                        e.setTexture(e.etype === 'k' ? (e.wf ? 'koopa_w' : 'koopa') : (e.wf ? 'goomba_w' : 'goomba'));
                    }

                    if (e.y > GH + 120) e.destroy();
                });
            }
        }

        //  SCENE: GAME OVER — VERSION CINÉMATIQUE BOOSTÉE

        class GameOverScene extends Phaser.Scene {
            constructor() { super({ key: 'GameOverScene' }); }

            // ── Données persistantes ───────────────────────────────────────
            _saveStats(score) {
                const best = +(localStorage.getItem('megabro_best') || 0);
                const games = +(localStorage.getItem('megabro_games') || 0);
                const total = +(localStorage.getItem('megabro_total') || 0);
                const newBest = score > best;
                if (newBest) localStorage.setItem('megabro_best', score);
                localStorage.setItem('megabro_games', games + 1);
                localStorage.setItem('megabro_total', total + score);
                return {
                    best: newBest ? score : best, games: games + 1,
                    avg: Math.round((total + score) / (games + 1)), newBest
                };
            }

            // ── Médaille selon le score ────────────────────────────────────
            _getMedal(score) {
                if (score >= 5000) return { icon: '🏆', label: 'LÉGENDE', col: '#FFD700', glow: '#ff9f00' };
                if (score >= 2000) return { icon: '🥇', label: 'CHAMPION', col: '#ffd700', glow: '#e6b800' };
                if (score >= 500) return { icon: '🥈', label: 'AVENTURIER', col: '#c0c0c0', glow: '#aaa' };
                return { icon: '🥉', label: 'DÉBUTANT', col: '#cd7f32', glow: '#a0522d' };
            }

            // ── Astuce aléatoire ───────────────────────────────────────────
            _getTip() {
                const tips = [
                    "💡 Double-saut sur les ennemis pour un bonus x2 !",
                    "💡 Collecte les étoiles dorées avant 10s pour un multiplicateur.",
                    "💡 Les boss ont un point faible — vise la tête !",
                    "💡 Garde 1 vie en réserve avant le niveau 5.",
                    "💡 Le bouclier dure 3s — timing = survie.",
                    "💡 Score > 2000 = accès au niveau secret 🗝️",
                ];
                return tips[Phaser.Math.Between(0, tips.length - 1)];
            }

            // ── Musique Game Over (Web Audio) ──────────────────────────────
            _playGameOverSFX() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const play = (freq, start, dur, type = 'sine', gain = 0.18) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime + start);
                        g.gain.setValueAtTime(gain, ctx.currentTime + start);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(ctx.currentTime + start);
                        o.stop(ctx.currentTime + start + dur + 0.05);
                    };
                    // Mélodie descendante dramatique
                    play(523, 0.0, 0.4); play(494, 0.35, 0.4);
                    play(440, 0.7, 0.4); play(392, 1.05, 0.8);
                    play(349, 1.8, 1.2); play(220, 2.8, 1.8, 'sawtooth', 0.08);
                } catch (e) { }
            }

            // ── Émetteur de particules feu/fumée ───────────────────────────
            _spawnFire(x, y, scale = 1) {
                const gfx = this.add.graphics();
                // Texture feu
                gfx.fillStyle(0xff4500, 1); gfx.fillCircle(8, 8, 8);
                gfx.generateTexture('fire_px', 16, 16); gfx.destroy();
                this.add.particles(x, y, 'fire_px', {
                    speed: { min: 30 * scale, max: 90 * scale },
                    angle: { min: 250, max: 290 },
                    scale: { start: 0.9 * scale, end: 0 },
                    lifespan: { min: 600, max: 1100 },
                    frequency: 40,
                    tint: [0xff4500, 0xff8c00, 0xffd700, 0xff6600],
                    alpha: { start: 1, end: 0 },
                });
                // Texture fumée
                const sg = this.add.graphics();
                sg.fillStyle(0x555555, 0.4); sg.fillCircle(10, 10, 10);
                sg.generateTexture('smoke_px', 20, 20); sg.destroy();
                this.add.particles(x, y, 'smoke_px', {
                    speed: { min: 20, max: 50 },
                    angle: { min: 255, max: 285 },
                    scale: { start: 0.4 * scale, end: 1.2 * scale },
                    lifespan: { min: 900, max: 1600 },
                    frequency: 120,
                    alpha: { start: 0.35, end: 0 },
                });
            }

                    this.tweens.add({
                        targets: s, alpha: Phaser.Math.FloatBetween(0.05, 0.3),

                    stars.push(s);

                /* --- Particules feu aux coins --- */
                this._spawnFire(GW * 0.18, GH, 1.1);

                this._spawnFire(GW * 0.5, GH, 0.7);

                /* --- GAME OVER avec animation d'entrée cinématique --- */
                const goTitle = this.add.text(GW / 2, -80, '💀 GAME OVER 💀', {

                }).setOrigin(0.5).setAlpha(0);

                // Chute dramatique depuis le haut

                        });
                        // Effet de vibration au choc
                        this.cameras.main.shake(350, 0.012);

                /* --- Score principal --- */
                const scoreText = this.add.text(GW / 2, 165,

                }).setOrigin(0.5).setAlpha(0);
                [mBg, mText].forEach(o => this.tweens.add({
                    targets: o, alpha: 1, duration: 400, delay: 1200

                // Rotation douce sur la médaille
                this.tweens.add({
                    targets: mText, scaleX: 1.06, scaleY: 1.06,

                });

                /* --- Panneau statistiques --- */
                const statPanel = this.add.graphics().setAlpha(0);
                statPanel.fillStyle(0x000000, 0.45);
                statPanel.fillRoundedRect(GW / 2 - 150, 272, 300, 82, 10);
                statPanel.lineStyle(1, 0x444444, 0.7);
                statPanel.strokeRoundedRect(GW / 2 - 150, 272, 300, 82, 10);
                this.tweens.add({ targets: statPanel, alpha: 1, duration: 400, delay: 1400 });

                const statLines = [

                statLines.forEach((line, i) => {

            // ── Bouton standard avec effets ─────────────────────────────────
            _btn(x, y, label, col, hov, delay, cb) {
                const g = this.add.graphics().setAlpha(0);
                const W = 180, H = 46;
                const draw = (c, glow = false) => {
                    g.clear();
                    if (glow) { g.fillStyle(c, 0.25); g.fillRoundedRect(x - W / 2 - 4, y - H / 2 - 4, W + 8, H + 8, 14); }
                    g.fillStyle(c, 1); g.fillRoundedRect(x - W / 2, y - H / 2, W, H, 10);
                    g.lineStyle(2, 0xffffff, 0.3); g.strokeRoundedRect(x - W / 2, y - H / 2, W, H, 10);
                };
                draw(col);
                g.setInteractive(new Phaser.Geom.Rectangle(x - W / 2, y - H / 2, W, H),
                    Phaser.Geom.Rectangle.Contains);
                g.on('pointerover', () => { draw(hov, true); txt.setScale(1.05); })
                    .on('pointerout', () => { draw(col); txt.setScale(1); })
                    .on('pointerdown', () => {
                        this.tweens.add({
                            targets: [g, txt], scaleX: 0.93, scaleY: 0.93,
                            duration: 80, yoyo: true, onComplete: cb
                        });
                    });
                const txt = this.add.text(x, y, label, {
                    fontSize: '17px', fontFamily: 'Courier New', fontStyle: 'bold', color: '#fff'
                }).setOrigin(0.5).setAlpha(0);
                [g, txt].forEach(o => this.tweens.add({
                    targets: o, alpha: 1, y: y, duration: 350, ease: 'Back.Out', delay
                }));
            }

            // ── Bouton partage de score ─────────────────────────────────────
            _shareBtn(x, y, score, medal, delay) {
                const g = this.add.graphics().setAlpha(0);
                const W = 220, H = 34;
                const draw = (hover = false) => {
                    g.clear();
                    g.fillStyle(hover ? 0x6a0dad : 0x4a0090, 1);
                    g.fillRoundedRect(x - W / 2, y - H / 2, W, H, 17);
                    g.lineStyle(1.5, 0xce93d8, 0.8); g.strokeRoundedRect(x - W / 2, y - H / 2, W, H, 17);
                };
                draw();
                g.setInteractive(new Phaser.Geom.Rectangle(x - W / 2, y - H / 2, W, H),
                    Phaser.Geom.Rectangle.Contains);
                g.on('pointerover', () => draw(true)).on('pointerout', () => draw(false));
                g.on('pointerdown', () => {
                    const msg = `🎮 MegaBro | ${medal.icon} ${medal.label}\n`

                    else { navigator.clipboard?.writeText(msg); }
                    this.tweens.add({
                        targets: [g, txt], scaleX: 0.95, scaleY: 0.95,
                        duration: 80, yoyo: true
                    });
                });
                const txt = this.add.text(x, y, '📤  Partager mon score', {
                    fontSize: '14px', fontFamily: 'Courier New', fontStyle: 'bold',
                    color: '#e1bee7'
                }).setOrigin(0.5).setAlpha(0);
                [g, txt].forEach(o => this.tweens.add({ targets: o, alpha: 1, duration: 400, delay }));
            }
        }

                }).setOrigin(0.5);

                const best = localStorage.getItem('megabro_best') || 0;
                this.add.text(GW / 2, 248, `🏆 Record : ${best}`, {
                    fontSize: '16px', fontFamily: 'Courier New', color: '#aaddff'
                }).setOrigin(0.5);

                // Confetti
                const cols = [0xFFD700, 0xff4444, 0x44ff44, 0x4444ff, 0xff44ff, 0x00ffff];
                for (let i = 0; i < 24; i++) {
                    this.time.delayedCall(i * 100, () => {
                        const r = this.add.rectangle(
                            Phaser.Math.Between(40, GW - 40), -12,
                            Phaser.Math.Between(8, 16), Phaser.Math.Between(8, 16),
                            Phaser.Math.RND.pick(cols)
                        );
                        this.tweens.add({
                            targets: r, y: GH + 20, angle: 360 * Phaser.Math.Between(2, 5),
                            duration: Phaser.Math.Between(2000, 4000), ease: 'Linear'
                        });
                    });
                }

                this._btn(GW / 2 - 120, 320, '🔄  Rejouer', 0x1565c0, 0x42a5f5, () => {
                    SFX.stopBg(); this.cameras.main.fadeOut(400);
                    this.time.delayedCall(400, () => this.scene.start('GameScene', { level: 0, score: 0, lives: 3 }));
                });
                this._btn(GW / 2 + 120, 320, '🏠  Menu', 0x6a1b9a, 0xab47bc, () => {
                    SFX.stopBg(); this.cameras.main.fadeOut(400);
                    this.time.delayedCall(400, () => this.scene.start('MenuScene'));
                });

                this.cameras.main.fadeIn(600);
                SFX.startBg(0);
            }
            _btn(x, y, label, col, hov, cb) {
                const g = this.add.graphics();
                const draw = c => {
                    g.clear(); g.fillStyle(c, 1); g.fillRoundedRect(x - 100, y - 24, 200, 48, 10);
                    g.lineStyle(2, 0xffffff, 0.25); g.strokeRoundedRect(x - 100, y - 24, 200, 48, 10);
                };
                draw(col);
                g.setInteractive(new Phaser.Geom.Rectangle(x - 100, y - 24, 200, 48), Phaser.Geom.Rectangle.Contains);
                g.on('pointerover', () => draw(hov)).on('pointerout', () => draw(col)).on('pointerdown', cb);
                this.add.text(x, y, label, { fontSize: '18px', fontFamily: 'Courier New', fontStyle: 'bold', color: '#fff' }).setOrigin(0.5);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        //  PHASER BOOT
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener('DOMContentLoaded', () => {
            initTouchControls();

            new Phaser.Game({
                type: Phaser.AUTO,
                width: GW,
                height: GH,
                parent: 'game-container',
                backgroundColor: '#050510',
                physics: {
                    default: 'arcade',
                    arcade: { gravity: { y: 600 }, debug: false }
                },
                scene: [MenuScene, GameScene, LevelIntroScene, GameOverScene, WinScene],
            });
        });
    </script>
</body>

</html>
